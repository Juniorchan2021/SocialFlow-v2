services:
  - type: web
    name: socialflow-v2
    runtime: node
    repo: https://github.com/Juniorchan2021/SocialFlow-v2
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
    plan: free
    branch: main
